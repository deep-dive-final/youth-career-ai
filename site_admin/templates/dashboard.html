                </div>
                <div style="display: flex; align-items: center; gap: 12px">
                  <span style="font-size: 12px; color: #a0aec0"

            </div>
            <div
              style="
                padding: 16px;

                transition: background 0.2s;
              "
              onmouseover="this.style.background = '#f8f9fd'"
              onmouseout="this.style.background = 'white'"
            >
              <div
                style="
                  display: flex;

                "
              >
                <div>
                  <p style="margin: 0 0 4px 0; color: #2d3748">이서준</p>
                  <p style="margin: 0; font-size: 14px; color: #a0aec0">

                  <span style="font-size: 12px; color: #a0aec0"

      <!-- Users Tab -->
      <div id="usersTab" class="hidden" style="padding: 24px 20px">
        <div
          style="
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
          "
        >
          <h3 style="margin: 0">👥 사용자 관리</h3>
          <button
            class="btn-primary"
            style="width: auto; padding: 10px 20px; font-size: 14px"
            onclick="toggleUserFilter()"
          >
            필터
          </button>
        </div>

        <!-- Filter Panel -->
        <div
          id="userFilterPanel"
          class="hidden"
          style="
            background: white;
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            margin-bottom: 16px;
          "
        >
          <div
            style="
              display: flex;
              align-items: center;
              justify-content: space-between;
              margin-bottom: 12px;
            "
          >
            <div style="display: flex; align-items: center; gap: 8px">
              <svg
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="#7a8a9e"
                stroke-width="2"
              >
                <polygon
                  points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"
                ></polygon>
              </svg>
              <p style="margin: 0; font-size: 14px; color: #7a8a9e">
                필터 설정
              </p>
            </div>
            <button
              onclick="toggleUserFilter()"
              style="background: none; border: none; cursor: pointer"
            >
              <svg
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="#7a8a9e"

                <line x1="18" y1="6" x2="6" y2="18"></line>

          </div>
          <div style="display: flex; gap: 12px">
            <div style="flex: 1">
              <label
                style="
                  display: block;
                  font-size: 14px;
                  color: #a0aec0;
                  margin-bottom: 4px;
                "
                >상태:</label
              >
              <select
                id="userStatusFilter"
                class="form-select"
                onchange="filterUsers()"
              >
                <option value="all">전체</option>
                <option value="active">활성</option>
                <option value="inactive">비활성</option>
              </select>
            </div>
            <div style="flex: 1">
              <label
                style="
                  display: block;
                  font-size: 14px;
                  color: #a0aec0;
                  margin-bottom: 4px;
                "
                >정렬:</label
              >
              <select
                id="userSortOrder"
                class="form-select"
                onchange="filterUsers()"
              >
                <option value="newest">최신순</option>
                <option value="oldest">오래된순</option>

        <div
          id="userList"
          style="
            background: white;
            border-radius: 24px;

          "
        ></div>

      <!-- Policies Tab -->

          style="

            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
          "
        >

            class="btn-primary"
            style="width: auto; padding: 10px 20px; font-size: 14px"
          >
            + 새 정책

          id="policyList"

    <!-- Floating Home Button -->
    <button
      id="floatingHome"
      class="floating-home"
      onclick="window.location.href = 'index.html'"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="24"
        height="24"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
      >
        <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
        <polyline points="9 22 9 12 15 12 15 22"></polyline>
      </svg>
    </button>

    <script src="{% static 'js/data.js' %}"></script>
    <script src="{% static 'js/main.js' %}"></script>
    <script>
      // Mock user data
      const adminUsers = [
        {
          name: "김지민",
          email: "jimin@email.com",
          status: "active",
          joinDate: "2025-12-01",
        },
        {
          name: "이서준",
          email: "seojun@email.com",
          status: "active",
          joinDate: "2025-11-15",
        },
        {
          name: "박민지",
          email: "minji@email.com",
          status: "active",
          joinDate: "2026-01-05",
        },
        {
          name: "최하은",
          email: "haeun@email.com",
          status: "inactive",
          joinDate: "2025-10-20",
        },
        {
          name: "정우진",
          email: "woojin@email.com",
          status: "active",
          joinDate: "2026-01-10",
        },
      ];

      function switchTab(tab) {
        // Hide all tabs
        document.getElementById("dashboardTab").classList.add("hidden");
        document.getElementById("usersTab").classList.add("hidden");
        document.getElementById("policiesTab").classList.add("hidden");

        // Update tab buttons
        document.querySelectorAll(".tab-btn").forEach((btn) => {
          btn.classList.remove("active");
        });

        // Show selected tab
        if (tab === "dashboard") {
          document.getElementById("dashboardTab").classList.remove("hidden");
          document.querySelectorAll(".tab-btn")[0].classList.add("active");
        } else if (tab === "policies") {
          document.getElementById("policiesTab").classList.remove("hidden");
          document.querySelectorAll(".tab-btn")[1].classList.add("active");
          renderPoliciesAdmin();
        } else if (tab === "users") {
          document.getElementById("usersTab").classList.remove("hidden");
          document.querySelectorAll(".tab-btn")[2].classList.add("active");
          renderUsers(adminUsers);
        }
      }

      function toggleUserFilter() {
        document.getElementById("userFilterPanel").classList.toggle("hidden");
      }

      function renderUsers(users) {
        const userList = document.getElementById("userList");
        userList.innerHTML = users
          .map(
            (user, index) => `
        <div style="padding: 16px; ${index < users.length - 1 ? "border-bottom: 1px solid #f0f4f8;" : ""} transition: background 0.2s;" onmouseover="this.style.background='#f8f9fd'" onmouseout="this.style.background='white'">
          <div style="display: flex; align-items: center; justify-content: space-between;">
            <div style="display: flex; align-items: center; gap: 12px;">
              <div style="width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(to bottom right, #a8e6cf, #7ec4cf); display: flex; align-items: center; justify-content: center;">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
              </div>
              <div>
                <p style="margin: 0 0 4px 0; color: #2d3748;">${user.name}</p>
                <p style="margin: 0; font-size: 14px; color: #a0aec0;">${user.email}</p>
              </div>
            </div>
            <div style="display: flex; align-items: center; gap: 12px;">
              <div style="text-align: right;">
                <p style="margin: 0; font-size: 12px; color: #a0aec0;">가입일</p>
                <p style="margin: 0; font-size: 14px; color: #2d3748;">${user.joinDate}</p>
              </div>
              <span style="padding: 6px 12px; ${user.status === "active" ? "background: #a8e6cf; color: #7ec4cf;" : "background: #cbd5e0; color: #718096;"} border-radius: 50px; font-size: 12px;">
                ${user.status === "active" ? "활성" : "비활성"}
              </span>
            </div>
          </div>
        </div>
      `,
          )
          .join("");
      }

      function filterUsers() {
        const statusFilter = document.getElementById("userStatusFilter").value;
        const sortOrder = document.getElementById("userSortOrder").value;

        let filtered = [...adminUsers];

        // Filter by status
        if (statusFilter !== "all") {
          filtered = filtered.filter((user) => user.status === statusFilter);
        }

        // Sort by date
        filtered.sort((a, b) => {
          const dateA = new Date(a.joinDate).getTime();
          const dateB = new Date(b.joinDate).getTime();
          return sortOrder === "newest" ? dateB - dateA : dateA - dateB;
        });

        renderUsers(filtered);
      }

      function renderPoliciesAdmin() {
        const policyList = document.getElementById("policyList");
        policyList.innerHTML = POLICIES.map(
          (policy) => `
        <div style="background: white; border-radius: 24px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);">
          <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 16px;">
            <div style="flex: 1;">
              <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 8px;">
                <h4 style="margin: 0; font-size: 16px; color: #2d3748;">${policy.name}</h4>
                <span style="padding: 4px 12px; background: #a8e6cf; color: #7ec4cf; border-radius: 50px; font-size: 12px;">진행중</span>
              </div>
              <p style="margin: 0; font-size: 14px; color: #a0aec0;">${policy.category}</p>
            </div>
            <div style="display: flex; gap: 8px;">
              <button style="width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(to bottom right, #a29bfe, #6c5ce7); border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
              </button>
              <button style="width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(to bottom right, #ff7675, #fab1a0); border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
              </button>
            </div>
          </div>
          <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;">
            <div style="background: linear-gradient(to bottom right, #f8f9fd, #e8f4f8); border-radius: 16px; padding: 12px;">
              <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 4px;">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#7ec4cf" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                <p style="margin: 0; font-size: 12px; color: #a0aec0;">신청자</p>
              </div>
              <p style="margin: 0; font-size: 18px; color: #2d3748;">1,234</p>
            </div>
            <div style="background: linear-gradient(to bottom right, #f8f9fd, #e8f4f8); border-radius: 16px; padding: 12px;">
              <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 4px;">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#a29bfe" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
